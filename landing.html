<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nisadya 2027</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{position:fixed;inset:0;display:block;}
#bgCanvas{z-index:1;}
#ptCanvas{z-index:2;pointer-events:none;}

.vignette{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,.88) 100%);}
.scanlines{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.03;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,#000 2px,#000 4px);}
.grain{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px;}

.ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.logo-wrap{position:relative;margin-bottom:40px;animation:logoIn 1.6s cubic-bezier(0.16,1,0.3,1) both;}
.logo-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,147,58,.2) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite;}
.logo-img{width:clamp(130px,18vw,200px);height:auto;position:relative;z-index:1;
  filter:drop-shadow(0 0 40px rgba(201,147,58,.55)) drop-shadow(0 0 100px rgba(201,147,58,.2));
  animation:logoFloat 4s ease-in-out infinite;}

.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,11vw,10rem);letter-spacing:14px;
  background:linear-gradient(160deg,#fff 15%,#E8C97A 50%,#C9933A 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(201,147,58,.25));
  animation:titleIn 1.2s .25s cubic-bezier(0.16,1,0.3,1) both;}
.subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.9rem,2vw,1.25rem);letter-spacing:5px;color:rgba(240,235,225,.45);
  margin-top:10px;animation:fadeUp .9s .5s cubic-bezier(0.16,1,0.3,1) both;}

.divider{display:flex;align-items:center;gap:14px;margin:32px 0;
  animation:fadeUp .8s .65s cubic-bezier(0.16,1,0.3,1) both;}
.dline{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,147,58,.6));}
.dline.r{background:linear-gradient(90deg,rgba(201,147,58,.6),transparent);}
.ddiamond{width:5px;height:5px;background:#C9933A;transform:rotate(45deg);}

.enter-btn{pointer-events:all;cursor:pointer;position:relative;overflow:hidden;
  font-family:'Inter',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:5px;text-transform:uppercase;
  color:#0a0800;padding:18px 60px;border:none;border-radius:60px;
  background:linear-gradient(135deg,#C9933A,#E8C97A,#C9933A);background-size:200% 200%;
  animation:fadeUp .9s .85s cubic-bezier(0.16,1,0.3,1) both, gradShift 3s 1.8s ease infinite;
  transition:transform .4s cubic-bezier(0.34,1.56,0.64,1),box-shadow .4s;}
.enter-btn:hover{transform:scale(1.07) translateY(-4px);box-shadow:0 20px 60px rgba(201,147,58,.5),0 0 0 1px rgba(201,147,58,.3);}
.enter-btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ripple .6s linear;}

.year{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'Inter',sans-serif;font-size:.6rem;letter-spacing:5px;text-transform:uppercase;
  color:rgba(240,235,225,.2);animation:fadeIn 1s 1.6s both;pointer-events:none;}

/* Curtain wipe out — gold from bottom */
.curtain{position:fixed;inset:0;z-index:100;
  background:linear-gradient(160deg,#C9933A,#E8C97A);
  transform:scaleY(0);transform-origin:bottom;pointer-events:none;}
.curtain.closing{animation:curtainClose .7s cubic-bezier(0.76,0,0.24,1) forwards;}

@keyframes logoIn{from{opacity:0;transform:scale(.8) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes titleIn{from{opacity:0;transform:translateY(32px) scaleX(.94);}to{opacity:1;transform:translateY(0) scaleX(1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7;}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}}
@keyframes gradShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
@keyframes ripple{to{transform:scale(5);opacity:0;}}
@keyframes curtainClose{from{transform:scaleY(0);}to{transform:scaleY(1);}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="ptCanvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="grain"></div>
<div class="curtain" id="curtain"></div>

<div class="ui">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <img class="logo-img" src="https://lh3.googleusercontent.com/d/1aIR3Y9QXJZ8E8eG2rquYECnUoL07Mxsz" alt="Nisadya" onerror="this.style.display='none'"/>
  </div>
  <h1 class="title">NISADYA</h1>
  <p class="subtitle">The National Management Conclave</p>
  <div class="divider">
    <div class="dline"></div><div class="ddiamond"></div><div class="dline r"></div>
  </div>
  <button class="enter-btn" id="enterBtn">Enter Experience</button>
</div>
<p class="year">DoMS · NIT Tiruchirappalli · 2025</p>

<script>
/* ── AURORA BG ── */
(function(){
  const c=document.getElementById('bgCanvas'),ctx=c.getContext('2d');
  let W,H,t=0;
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight;}
  window.addEventListener('resize',sz);sz();
  const orbs=[
    {x:.15,y:.3,r:.4,col:'60,20,90',s:.00025},
    {x:.85,y:.7,r:.35,col:'100,55,10',s:.0003},
    {x:.5,y:.5,r:.45,col:'25,10,60',s:.0002},
    {x:.05,y:.8,r:.3,col:'80,30,5',s:.00045},
    {x:.9,y:.15,r:.32,col:'50,15,75',s:.00035},
  ];
  function draw(){
    ctx.fillStyle='#020008';ctx.fillRect(0,0,W,H);
    orbs.forEach((o,i)=>{
      const ox=o.x*W+Math.sin(t*o.s*1000+i)*W*.07;
      const oy=o.y*H+Math.cos(t*o.s*1000+i*1.4)*H*.07;
      const r=o.r*Math.max(W,H);
      const g=ctx.createRadialGradient(ox,oy,0,ox,oy,r);
      g.addColorStop(0,`rgba(${o.col},.2)`);g.addColorStop(.5,`rgba(${o.col},.08)`);g.addColorStop(1,`rgba(${o.col},0)`);
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });
    // Gold streaks
    for(let i=0;i<3;i++){
      const x=W*(.2+i*.3)+Math.sin(t*.0003+i)*W*.1;
      const g2=ctx.createLinearGradient(x-200,0,x+200,H);
      g2.addColorStop(0,'rgba(201,147,58,0)');
      g2.addColorStop(.5,`rgba(201,147,58,${.015+Math.sin(t*.001+i)*.01})`);
      g2.addColorStop(1,'rgba(201,147,58,0)');
      ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
    }
    t++;requestAnimationFrame(draw);
  }draw();
})();

/* ── PARTICLES ── */
(function(){
  const c=document.getElementById('ptCanvas'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight;}
  window.addEventListener('resize',()=>{sz();init();});sz();
  function init(){pts=Array.from({length:130},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.3,o:Math.random()*.6+.1,gold:Math.random()>.45}));}
  init();
  let mx=W/2,my=H/2;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);
      if(d<140){p.vx+=dx/d*.016;p.vy+=dy/d*.016;}
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if(spd>.72){p.vx=p.vx/spd*.72;p.vy=p.vy/spd*.72;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.gold?`rgba(201,147,58,${p.o})`:`rgba(255,255,255,${p.o*.4})`;ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(201,147,58,${.14*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke();}
    }));
    requestAnimationFrame(draw);
  }draw();
})();

/* ── ENTER ── */
document.getElementById('enterBtn').addEventListener('click',function(e){
  // Ripple
  const btn=this,rect=btn.getBoundingClientRect();
  const rip=document.createElement('span');rip.className='ripple';
  const sz=Math.max(rect.width,rect.height)*2;
  rip.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px;position:absolute;`;
  btn.appendChild(rip);
  // Gold curtain close, then go
  setTimeout(()=>{
    document.getElementById('curtain').classList.add('closing');
    setTimeout(()=>{ location.href='index.html'; },720);
  },200);
});
document.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('enterBtn').click();});
</script>
</body>
</html>
