<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Schedule – Nisadya</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.sched-section{background:var(--bg2);padding:90px 0 120px;position:relative;overflow:hidden;}
.sched-parallax-word{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fd);font-size:clamp(10rem,20vw,20rem);color:rgba(201,147,58,.025);white-space:nowrap;pointer-events:none;-webkit-user-select:none;user-select:none;will-change:transform;}
.sched-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:56px;position:relative;z-index:1;}
.sched-card{border-radius:var(--rl);overflow:hidden;transition:transform .4s var(--ease),box-shadow .4s;}
.sched-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,.3);}
[data-theme="light"] .sched-card{background:rgba(255,255,255,.78);border:1px solid rgba(0,0,0,.07);box-shadow:0 4px 24px rgba(0,0,0,.06);}
.sched-header{padding:28px 32px;background:linear-gradient(135deg,rgba(201,147,58,.12) 0%,rgba(201,147,58,.03) 100%);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
[data-theme="light"] .sched-header{border-bottom-color:rgba(0,0,0,.07);}
.sched-label h3{font-family:var(--fd);font-size:.95rem;letter-spacing:5px;color:var(--gold);}
.sched-label span{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-top:4px;display:block;}
.sched-num{font-family:var(--fd);font-size:5rem;line-height:1;letter-spacing:-3px;color:rgba(201,147,58,.12);-webkit-user-select:none;user-select:none;}
[data-theme="light"] .sched-num{color:rgba(140,90,15,.14);}
.tl-list{padding:8px 0 16px;}
.tl-item{display:flex;position:relative;padding:0 28px 0 22px;transition:background .3s;}
.tl-item:hover{background:rgba(201,147,58,.04);}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:31px;top:28px;bottom:-8px;width:1px;background:var(--bdr2);}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:18px;margin-right:16px;flex-shrink:0;}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;box-shadow:0 0 10px var(--glow);position:relative;z-index:1;transition:transform .3s var(--easeback);}
.tl-item:hover .tl-dot{transform:scale(1.4);}
.tl-body{padding:13px 0 18px;flex:1;min-width:0;}
.tl-time{font-size:.66rem;font-weight:600;letter-spacing:1.5px;color:var(--gold);margin-bottom:3px;text-transform:uppercase;}
.tl-event{font-family:var(--fs);font-size:1rem;font-weight:700;line-height:1.3;margin-bottom:3px;color:var(--tx);}
.tl-venue{font-size:.68rem;color:var(--tx2);display:flex;align-items:center;gap:4px;}
.tl-venue::before{content:'◆';color:var(--gold);font-size:.4rem;}
@media(max-width:768px){.sched-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="ph"><div class="ph-glow"></div><div class="ph-grid"></div>
  <p class="ph-label">Programme</p>
  <h1 class="ph-title">SCHEDULE</h1>
  <p class="ph-sub">Two days. Every moment mapped.</p>
</div>
<section class="sched-section" id="schedSection">
  <div class="sched-parallax-word" id="schedWord">SCHEDULE</div>
  <div class="container">
    <span class="eyebrow rv">Timeline</span>
    <h2 class="sec-title rv">Event Schedule</h2>
    <div class="sec-line rv"></div>
    <div class="sched-grid">
      <div class="sched-card glass rv">
        <div class="sched-header"><div class="sched-label"><h3>DAY 1</h3><span>Programme</span></div><div class="sched-num">01</div></div>
        <div class="tl-list" id="day1"></div>
      </div>
      <div class="sched-card glass rv d2">
        <div class="sched-header"><div class="sched-label"><h3>DAY 2</h3><span>Programme</span></div><div class="sched-num">02</div></div>
        <div class="tl-list" id="day2"></div>
      </div>
    </div>
  </div>
</section>
<div id="foot-root"></div>
<script src="js/config.js"></script>
<script>
function renderTL(id,rows){
  const el=document.getElementById(id);
  if(!rows.length){el.innerHTML='<div style="padding:36px 28px;color:var(--tx3);font-size:.82rem;letter-spacing:1px;">No entries yet.</div>';return;}
  el.innerHTML=rows.map(r=>`
    <div class="tl-item">
      <div class="tl-dot-col"><div class="tl-dot"></div></div>
      <div class="tl-body">
        <div class="tl-time">${r[1]||''}</div>
        <div class="tl-event">${r[2]||''}</div>
        ${r[3]?`<div class="tl-venue">${r[3]}</div>`:''}
      </div>
    </div>`).join('');
}
async function loadSchedule(){
  try{
    const res=await fetch(sheetUrl(CONFIG.sheets.scheduleSheetId,CONFIG.sheetTabs.schedule));
    if(!res.ok)throw new Error();
    const rows=parseCSV(await res.text());
    renderTL('day1',rows.filter(r=>r[0]==='1'));
    renderTL('day2',rows.filter(r=>r[0]==='2'));
    addSearchItems(rows.filter(r=>r[2]).map(r=>({tag:'Schedule',title:r[2],snippet:`Day ${r[0]} · ${r[1]||''} · ${r[3]||''}`,url:'schedule.html'})));
  }catch(e){
    ['day1','day2'].forEach(id=>{document.getElementById(id).innerHTML='<div style="padding:36px 28px;color:var(--tx3);font-size:.82rem;">Failed to load. Check Sheet ID.</div>';});
  }
}
function initSchedParallax(){
  const word=document.getElementById('schedWord');
  const sec=document.getElementById('schedSection');
  if(!word||!sec)return;
  window.addEventListener('scroll',()=>{
    const r=sec.getBoundingClientRect();
    const prog=(window.innerHeight-r.top)/(r.height+window.innerHeight);
    word.style.transform=`translate(-50%,-50%) translateX(${prog*-100}px)`;
  });
}
boot('schedule',()=>{loadSchedule();initSchedParallax();});
</script>
</body>
</html>
